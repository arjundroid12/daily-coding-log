name: Daily Coding Log

on:
  schedule:
    # Run multiple times per day to spread commits across 9 AM - 10 PM IST
    # IST = UTC + 5:30, so:
    #   9:00 AM IST  = 3:30 AM UTC  → '30 3 * * *'
    #   12:00 PM IST = 6:30 AM UTC  → '30 6 * * *'
    #   3:00 PM IST  = 9:30 AM UTC  → '30 9 * * *'
    #   6:00 PM IST  = 12:30 PM UTC → '30 12 * * *'
    #   9:00 PM IST  = 3:30 PM UTC  → '30 15 * * *'
    # The script decides whether to actually commit (random + dedup by date).
    - cron: '30 3 * * *'
    - cron: '30 6 * * *'
    - cron: '30 9 * * *'
    - cron: '30 12 * * *'
    - cron: '30 15 * * *'
  workflow_dispatch:
    # Manual trigger for testing

permissions:
  contents: write

concurrency:
  group: daily-coding-log-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 5  # Need recent commits to check if already committed today

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check if already committed today
        id: check
        run: |
          # Get today's date in IST (UTC+5:30)
          TODAY=$(TZ='Asia/Kolkata' date +%Y-%m-%d)
          echo "today=$TODAY" >> $GITHUB_OUTPUT

          # Check if there's a log file for today already
          if [ -f "logs/$TODAY.md" ]; then
            echo "already_committed=true" >> $GITHUB_OUTPUT
            echo "📅 Already committed today ($TODAY). Skipping."
          else
            # 60% chance to commit on this run (so commits spread across the day naturally)
            ROLL=$((RANDOM % 100))
            if [ $ROLL -lt 60 ]; then
              echo "already_committed=false" >> $GITHUB_OUTPUT
              echo "🎲 Rolling ($ROLL < 60) — will commit today ($TODAY)"
            else
              echo "already_committed=true" >> $GITHUB_OUTPUT
              echo "🎲 Rolling ($ROLL >= 60) — skipping this run, will try again later"
            fi
          fi

      - name: Generate today's content
        if: steps.check.outputs.already_committed == 'false'
        run: node scripts/generate-daily.mjs

      - name: Commit and push
        if: steps.check.outputs.already_committed == 'false'
        run: |
          git config user.name "arjundroid12"
          git config user.email "arjunvashishtha2004@gmail.com"

          TODAY="${{ steps.check.outputs.today }}"

          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "day $(TZ='Asia/Kolkata' date +%j): daily coding log for $TODAY

          Auto-generated by GitHub Actions.
          - Random coding challenge + solution
          - Tip of the day
          - Daily reflection prompt
          - Updated README with today's snapshot"

          git push
          echo "✅ Pushed commit for $TODAY"
